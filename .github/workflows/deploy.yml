name: Deploy to AWS EC2

on:
  push:
    branches:
      - main  # Triggers when you push to the 'main' branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Go into the project directory
            cd College-Resource-Sharing-System
            
            # 2. Pull the latest code from GitHub main branch
            git fetch origin
            git reset --hard origin/main
            
            # 3. Export variables from your existing .env file to preserve your HTTPS/Domain setup
            export $(grep -v '^#' .env | xargs)
            
            # 4. Rebuild and restart the Docker containers with the new code
            docker compose -f docker-compose.prod.yml up -d --build
