name: Deploy to AWS EC2

on:
  push:
    branches:
      - main  # Triggers when you push to the 'main' branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Go into the project directory
            cd College-Resource-Sharing-System
            
            # 2. Pull the latest code from GitHub main branch
            git fetch origin
            git reset --hard origin/main
            
            # 2.5 Ensure the EC2 instance has a Swap file so npm install/build doesn't crash it
            if [ $(sudo swapon --show | wc -l) -eq 0 ]; then
              echo "No swap file found. Creating a 2GB swap file to prevent out-of-memory errors..."
              sudo fallocate -l 2G /swapfile
              sudo chmod 600 /swapfile
              sudo mkswap /swapfile
              sudo swapon /swapfile
              echo "/swapfile swap swap defaults 0 0" | sudo tee -a /etc/fstab
            else
              echo "Swap file already exists."
            fi
            
            # 3. Export variables from your existing .env file to preserve your HTTPS/Domain setup
            export $(grep -v '^#' .env | xargs)
            
            # 4. Rebuild and restart the Docker containers with the new code
            docker compose -f docker-compose.prod.yml up -d --build
