name: Deploy to AWS EC2

on:
  push:
    branches:
      - main  # Triggers when you push to the 'main' branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Go into the project directory (Change 'crss' to your actual folder name if different)
            cd crss
            
            # 2. Pull the latest code from GitHub
            git pull origin main
            
            # 3. Export the API URL using the server's public IP
            # (We use a curl command to automatically fetch the EC2 instance's public IP)
            export PUBLIC_API_URL=http://$(curl -s http://checkip.amazonaws.com):8000/api/v1
            
            # 4. Rebuild and restart the Docker containers with the new code
            docker compose -f docker-compose.prod.yml up -d --build
