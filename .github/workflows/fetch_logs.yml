name: Fetch EC2 Logs

on:
  push:
    branches:
      - akarsh

jobs:
  fetch-logs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Fetch logs
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd College-Resource-Sharing-System
            docker compose -f docker-compose.prod.yml logs backend --tail 300 > /tmp/backend_logs.txt
      - name: Download logs
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "/tmp/backend_logs.txt"
          target: "./logs/"
      - name: Commit logs
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          mv logs/tmp/backend_logs.txt backend_logs.txt || echo "File not found"
          git add backend_logs.txt
          git commit -m "Add backend logs" || echo "No changes to commit"
          git push origin akarsh
