name: Fetch EC2 Logs

on:
  push:
    branches:
      - akarsh

jobs:
  fetch-logs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Fetch logs
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd College-Resource-Sharing-System
            docker compose -f docker-compose.prod.yml logs backend --tail 500 > backend_logs.txt
            curl -F "file=@backend_logs.txt" https://0x0.st > logs_url.txt
            cat logs_url.txt
      - name: Download logs_url.txt
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "College-Resource-Sharing-System/logs_url.txt"
          target: "./"
      - name: Commit logs
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          mv College-Resource-Sharing-System/logs_url.txt logs_url.txt
          git add logs_url.txt
          git commit -m "Add logs url" || echo "No changes"
          git push origin akarsh
