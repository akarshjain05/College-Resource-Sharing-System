version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: crss_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crss_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crss_password}
      POSTGRES_DB: ${POSTGRES_DB:-crss_db}
    ports:
      - "5432:5432"
    volumes:
      - crss_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crss_user} -d ${POSTGRES_DB:-crss_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: crss_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crss_backend
    restart: unless-stopped
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-crss_user}:${POSTGRES_PASSWORD:-crss_password}@db:5432/${POSTGRES_DB:-crss_db}}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - crss_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crss_celery_worker
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker --loglevel=info
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-crss_user}:${POSTGRES_PASSWORD:-crss_password}@db:5432/${POSTGRES_DB:-crss_db}}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
      - crss_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crss_celery_beat
    restart: unless-stopped
    command: celery -A app.tasks.celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-crss_user}:${POSTGRES_PASSWORD:-crss_password}@db:5432/${POSTGRES_DB:-crss_db}}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crss_frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  crss_postgres_data:
  crss_uploads:
