services:
  # ---------- Backend API ----------
  - type: web
    name: crss-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    dockerCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: crss-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: crss-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: PROJECT_NAME
        value: Campus Resource Sharing System
      - key: API_V1_PREFIX
        value: /api/v1
      - key: BACKEND_CORS_ORIGINS
        value: '["https://crss-frontend.onrender.com"]'
      - key: UPLOAD_DIR
        value: /app/uploads
      - key: MAX_UPLOAD_SIZE_MB
        value: "10"
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        value: noreply@crss.edu
      - key: SMTP_TLS
        value: "true"

  # ---------- Celery worker (borrow reminders, background jobs) ----------
  - type: worker
    name: crss-celery-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    dockerCommand: celery -A app.tasks.celery_app worker --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: crss-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: crss-redis
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        value: noreply@crss.edu

 # ---------- Celery beat (schedules the daily reminder job) ----------
  - type: worker
    name: crss-celery-beat
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    dockerCommand: celery -A app.tasks.celery_app beat --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: crss-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: crss-redis
          property: connectionString
      - key: SECRET_KEY
        sync: false

  # ---------- Frontend (static build served from Render's CDN) ----------
  - type: web
    name: crss-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://crss-backend.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ---------- Redis (rate limiting + Celery broker) ----------
  - type: redis
    name: crss-redis
    plan: free
    ipAllowList: []

databases:
  - name: crss-db
    plan: free
    databaseName: crss_db
    user: crss_user