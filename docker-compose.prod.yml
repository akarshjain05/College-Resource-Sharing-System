# Standalone production compose file for a single VM (e.g. Oracle Cloud Always Free).
#
# Deliberately NOT a partial override of docker-compose.yml: Compose merges list-typed
# fields (volumes, ports) by CONCATENATION across -f files, not replacement, so trying
# to "clear" the dev bind-mounts via an override would silently fail to remove them.
# This file is self-contained instead, so what you read here is exactly what runs.
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build

services:
  db:
    image: postgres:16-alpine
    container_name: crss_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crss_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crss_password}
      POSTGRES_DB: ${POSTGRES_DB:-crss_db}
    volumes:
      - crss_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crss_user} -d ${POSTGRES_DB:-crss_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # No "ports:" mapping to the host -- only other containers on the Compose
    # network need to reach Postgres. Keeping it off the public interface entirely
    # is safer than relying on the VM's firewall alone.

  redis:
    image: redis:7-alpine
    container_name: crss_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crss_backend
    restart: unless-stopped
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-crss_user}:${POSTGRES_PASSWORD:-crss_password}@db:5432/${POSTGRES_DB:-crss_db}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
      DEBUG: "false"
      BACKEND_CORS_ORIGINS: '["*"]'
    ports:
      - "8000:8000"
    volumes:
      - crss_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crss_celery_worker
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker --loglevel=info
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-crss_user}:${POSTGRES_PASSWORD:-crss_password}@db:5432/${POSTGRES_DB:-crss_db}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
    volumes:
      - crss_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crss_celery_beat
    restart: unless-stopped
    command: celery -A app.tasks.celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-crss_user}:${POSTGRES_PASSWORD:-crss_password}@db:5432/${POSTGRES_DB:-crss_db}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: ${PUBLIC_API_URL}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
    container_name: crss_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  crss_postgres_data:
  crss_uploads:
