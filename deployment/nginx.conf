# Production reverse proxy: routes / to the frontend and /api, /docs, /uploads to the
# backend. Intended to run as a HOST-LEVEL Nginx (installed via `apt install nginx`,
# not a container), reverse-proxying to the app containers via their loopback port
# mappings (127.0.0.1:8000 for the backend, 127.0.0.1:8080 for the frontend) — see
# deployment/ORACLE_CLOUD_GUIDE.md step 12 for the matching docker-compose.prod.yml
# port change needed before enabling this (the frontend container must stop publishing
# directly to host port 80, since this Nginx now owns 80/443).
#
# Point your domain's A record at the host running this Nginx.

upstream crss_backend {
    server 127.0.0.1:8000;
}

upstream crss_frontend {
    server 127.0.0.1:8080;
}

server {
    listen 80;
    server_name your-campus-domain.edu;

    client_max_body_size 15M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /api/ {
        proxy_pass http://crss_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /docs {
        proxy_pass http://crss_backend;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://crss_backend;
        proxy_set_header Host $host;
    }

    location /uploads/ {
        proxy_pass http://crss_backend;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://crss_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
