# Production reverse proxy: routes / to the frontend container and
# /api, /docs, /uploads to the backend container. Use this if you want
# a single public entrypoint instead of exposing frontend:5173 and backend:8000
# separately. Point your domain's A record at the host running this Nginx.
#
# Usage: run this on the VPS itself (not inside docker-compose), or add it
# as an additional service pointing at the `frontend` and `backend` container
# names/ports defined in docker-compose.yml.

upstream crss_backend {
    server backend:8000;
}

upstream crss_frontend {
    server frontend:5173;
}

server {
    listen 80;
    server_name your-campus-domain.edu;

    client_max_body_size 15M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /api/ {
        proxy_pass http://crss_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /docs {
        proxy_pass http://crss_backend;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://crss_backend;
        proxy_set_header Host $host;
    }

    location /uploads/ {
        proxy_pass http://crss_backend;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://crss_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
